<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onslaught: Vertical Tower Defense</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
    <div id="game-container">
        <div id="ui-overlay">
            <div id="wave-display"  class="stat-box stone">⚔ Wave: 1</div>
            <div id="score-display" class="stat-box stone">Score: 0</div>
            <div id="gold-display"  class="stat-box stone">🪙 25</div>
            <div id="lives-display" class="stat-box stone">♥ 20</div>
        </div>
        <div id="flash-msg"></div>
        <div id="btn-group">
            <button id="speed-btn" class="stone" title="Press F to toggle">▶ 1x</button>
            <button id="mute-btn"  class="stone" title="Mute / unmute music">🔊</button>
        </div>
        <div id="hint">L-click slot: Place Hero &nbsp;|&nbsp; R-click empty slot: Build Tower (5g) &nbsp;|&nbsp; R-click tower: Upgrade (8-20g)</div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
